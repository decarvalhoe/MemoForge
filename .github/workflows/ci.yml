name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint --if-present

      - name: Test (+ couverture engine >=90%)
        run: npm test

      - name: Build
        run: npm run build --if-present
