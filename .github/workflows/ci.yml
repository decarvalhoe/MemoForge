name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint --if-present

      - name: Test (+ couverture engine >=90%)
        run: npm test

      # Écrans clés : capture + invariants structurels (Chrome préinstallé sur le runner).
      # Les références pixel sont par plateforme (tests/visual/baseline/<os>) : sur le
      # runner elles sont recréées à chaque run (seed) — la vérif structurelle, elle,
      # casse le job si un écran ne rend plus ce qu'il doit.
      - name: Tests visuels (écrans clés)
        run: npm run test:visual

      - name: Captures des écrans clés (artefact)
        uses: actions/upload-artifact@v4
        with:
          name: ecrans-cles
          path: tests/visual/out/
          retention-days: 14

      - name: Build
        run: npm run build --if-present
