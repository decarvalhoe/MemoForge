name: Bug
description: Un comportement incorrect à corriger
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Comportement observé
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Étapes minimales pour reproduire.
      placeholder: |
        1. ...
        2. ...
  - type: input
    id: env
    attributes:
      label: Environnement
      placeholder: "navigateur / OS / commit"
